http:
  routers:
    councilnow-http:
      rule: "Host(`councilnow.com`) || Host(`www.councilnow.com`)"
      entryPoints:
        - web
      service: councilnow-marketing
      middlewares:
        - redirect-to-https

    councilnow-auth:
      rule: "Host(`councilnow.com`) && (PathPrefix(`/auth`) || PathPrefix(`/api/waitlist`) || PathPrefix(`/api/billing`) || PathPrefix(`/billing`) || PathPrefix(`/webhooks`))"
      entryPoints:
        - websecure
      service: councilnow-hub
      priority: 40
      tls:
        certResolver: letsencrypt

    councilnow-api:
      rule: "Host(`councilnow.com`) && (PathPrefix(`/api/v1`) || PathPrefix(`/health`))"
      entryPoints:
        - websecure
      service: councilnow-api
      priority: 30
      tls:
        certResolver: letsencrypt

    councilnow-frontend-assets:
      rule: "Host(`councilnow.com`) && PathPrefix(`/_app`)"
      entryPoints:
        - websecure
      service: councilnow-frontend
      priority: 25
      tls:
        certResolver: letsencrypt

    councilnow-frontend:
      rule: "Host(`councilnow.com`) && (PathPrefix(`/app`) || PathPrefix(`/login`) || PathPrefix(`/shared`))"
      entryPoints:
        - websecure
      service: councilnow-frontend
      priority: 20
      tls:
        certResolver: letsencrypt

    councilnow-marketing:
      rule: "Host(`councilnow.com`) || Host(`www.councilnow.com`)"
      entryPoints:
        - websecure
      service: councilnow-marketing
      priority: 10
      tls:
        certResolver: letsencrypt

  services:
    councilnow-marketing:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.181.203.100:5181"

    councilnow-frontend:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.181.203.100:5180"

    councilnow-api:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.181.203.100:8210"

    councilnow-hub:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.181.203.100:8211"
